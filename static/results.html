<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Nextern — Recommendations</title>
  <link rel="stylesheet" href="main.css"/>
</head>
<body>
  <nav class="nav">
    <div class="brand">Next<span>ern</span></div>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="insights.html">Insights</a>
      <a href="history.html">History</a>
      <a href="about.html">About</a>
    </div>
  </nav>

  <div class="wrap">
    <div class="hero">
      <h1>Top matches</h1>
      <p id="subtitle" class="muted"></p>
    </div>

    <div id="rationale"></div>

    <div class="spacer"></div>
    <div id="results" class="grid grid-3"></div>

    <div class="spacer"></div>
    <div class="row">
      <a class="btn btn-primary" href="/">New recommendation</a>
      <a class="btn btn-ghost" href="history.html">View history</a>
    </div>
  </div>

  <script>
    const el = document.getElementById('results');
    const raw = sessionStorage.getItem('lastPrediction');

    if (!raw) {
      el.innerHTML = '<div class="card">No recent recommendation. <a href="/">Start one</a>.</div>';
    } else {
      const res = JSON.parse(raw);
      const recs = res.recommendations || [];
      const who = res.student && res.student['Student name'];
      document.getElementById('subtitle').textContent =
        (who ? who + ' · ' : '') + (res.student ? res.student['Technical skills'] : '');

      // AI copilot runs include a coaching narrative
      if (res.rationale) {
        const providerLabel = res.provider === 'anthropic' ? 'Claude' : res.provider === 'gemini' ? 'Gemini' : 'AI';
        document.getElementById('rationale').innerHTML =
          '<div class="spacer"></div><div class="card"><div class="rank" style="margin-bottom:8px">AI coach ' +
          '<span class="badge">' + providerLabel + '</span></div>' +
          res.rationale.split('\n').filter(p => p.trim()).map(p => `<p class="muted" style="margin:8px 0">${p}</p>`).join('') +
          '</div>';
      }

      const ranks = ['Best fit', '2nd', '3rd'];
      const block = (label, chipsHtml) => chipsHtml
        ? `<div><div class="sub" style="margin-bottom:6px">${label}</div><div class="chips">${chipsHtml}</div></div>`
        : '';

      el.innerHTML = recs.map((r, i) => {
        const matched = (r.matched_skills || []).map(s => `<span class="chip">${s}</span>`).join('');
        const related = (r.related_skills || []).map(x =>
          `<span class="chip related" title="counts partially — same family as ${x.via}">${x.skill} ↔ ${x.via}</span>`).join('');
        const gaps = (r.gap_skills || []).map(s => `<span class="chip gap">${s}</span>`).join('');
        return `
        <div class="rec">
          <div class="rank">${ranks[i] || (i + 1) + 'th'}</div>
          <div class="name">${r.company}</div>
          <div class="pct">${r.confidence}%</div>
          <div class="meter"><i style="width:${Math.max(4, r.confidence)}%"></i></div>
          <div class="sub">${r.location} · avg intern rating ${r.avg_rating}/4</div>
          ${block('Matched skills', matched || '<span class="chip muted">none directly matched</span>')}
          ${block('Related skills', related)}
          ${block('Skills to learn', gaps)}
        </div>`;
      }).join('');
    }
  </script>
</body>
</html>
