<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>InternMatch — Recommendations</title>
  <link rel="stylesheet" href="main.css"/>
</head>
<body>
  <nav class="nav">
    <div class="brand">Intern<span>Match</span></div>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="insights.html">Insights</a>
      <a href="history.html">History</a>
    </div>
  </nav>

  <div class="wrap">
    <div class="hero">
      <h1>Top matches</h1>
      <p id="subtitle" class="muted"></p>
    </div>

    <div class="spacer"></div>
    <div id="results" class="grid grid-3"></div>

    <div class="spacer"></div>
    <div class="row">
      <a class="btn btn-primary" href="/">New recommendation</a>
      <a class="btn btn-ghost" href="history.html">View history</a>
    </div>
  </div>

  <script>
    const el = document.getElementById('results');
    const raw = sessionStorage.getItem('lastPrediction');

    if (!raw) {
      el.innerHTML = '<div class="card">No recent recommendation. <a href="/">Start one</a>.</div>';
    } else {
      const res = JSON.parse(raw);
      const recs = res.recommendations || [];
      const who = res.student && res.student['Student name'];
      document.getElementById('subtitle').textContent =
        (who ? who + ' · ' : '') + (res.student ? res.student['Technical skills'] : '');

      const ranks = ['Best fit', '2nd', '3rd'];
      el.innerHTML = recs.map((r, i) => `
        <div class="rec">
          <div class="rank">${ranks[i] || (i + 1) + 'th'}</div>
          <div class="name">${r.company}</div>
          <div class="pct">${r.confidence}%</div>
          <div class="meter"><i style="width:${Math.max(4, r.confidence)}%"></i></div>
          <div class="sub">${r.location} · avg intern rating ${r.avg_rating}/4</div>
          <div>
            <div class="sub" style="margin-bottom:6px">Matched skills</div>
            <div class="chips">${
              r.matched_skills.length
                ? r.matched_skills.map(s => `<span class="chip">${s}</span>`).join('')
                : '<span class="chip muted">none directly matched</span>'
            }</div>
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
